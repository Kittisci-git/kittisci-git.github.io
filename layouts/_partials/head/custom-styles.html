<style>
    .heading-link {
        display: none;
    }

    nav.navigation {
        position: fixed;
        top: 0;
        width: 100%;
        z-index: 100;
    }

    nav.navigation .colorscheme-toggle {
        position: static;
        display: inline-block;
        width: auto;
        height: auto;
        background-color: transparent;
        border-radius: 0;
        opacity: 1;
        font-size: 1em;
    }

    .navigation #dark-mode-toggle {
        position: static !important;
        bottom: auto !important;
        left: auto !important;
        z-index: auto !important;
        margin-left: auto;
    }

    ul.navigation-list {
        display: flex;
        align-items: center;
        width: 100%;
        margin: 0;
        padding: 0;
        justify-content: flex-end;
    }

    nav.navigation .container {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 2rem;
        width: 100%;
        box-sizing: border-box;
    }

    .navigation-title {
        flex-shrink: 0;
        margin-right: 2rem;
    }
    
    body.colorscheme-light nav.navigation {
        background-color: #fafafa;
    }

    body.colorscheme-dark nav.navigation{
        background-color: #212121;
    }

    .wrapper {
        padding-top: 3rem;
    }
</style>

<style>
    #return-to-top {
        -webkit-appearance: none;
        appearance: none;
        position: fixed;
        bottom: 2rem;
        right: 2rem;
        border: none;
        border-radius: 50%;
        width: 3rem;
        height: 3rem;
        font-size: 1.9rem;
        cursor: pointer;
        display: none;
        z-index: 999;
        opacity: 0.5;
        transition: all 0.25s ease-in;
        align-items: center;
        justify-content: center;
        background: #dadada;
        color: #212121;
    }

    body.colorscheme-dark #return-to-top {
        background: #dadada;
        color: #212121;
    }

    body.colorscheme-dark #return-to-top:hover {
        background: #42a5f5;
        color: #212121;
    }

    body.colorscheme-light #return-to-top {
        background: #212121;
        color: #dadada;
    }

    body.colorscheme-light #return-to-top:hover {
        background: #1565c0;
        color: #dadada;
    }

    html body div #return-to-top {
        background-color :red !important
    }
</style>

<button id="return-to-top" onclick="window.scrollTo({top: 0, behavior: 'smooth'})"><i class="fa-solid fa-arrow-up"></i></button>

<script>
    window.addEventListener('scroll', function() {
        const btn = document.getElementById('return-to-top');
        btn.style.display = window.scrollY > 300 ? 'block' : 'none';
    });
</script>
